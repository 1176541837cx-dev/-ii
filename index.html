<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        
        <div class="scoreboard">
            <div class="score-section">
                <p class="label">Player</p>
                <p class="score" id="playerScore">0</p>
            </div>
            <div class="divider">vs</div>
            <div class="score-section">
                <p class="label">Computer</p>
                <p class="score" id="computerScore">0</p>
            </div>
        </div>

        <div class="controls">
            <p><strong>Controls:</strong> Move mouse up/down or use Arrow Keys ↑ ↓</p>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="info">
            <p>Press <strong>SPACE</strong> to start | Press <strong>R</strong> to reset game</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
